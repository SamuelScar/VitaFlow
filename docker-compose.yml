services:
  app:
    build:
      context: ./docker/app
    container_name: vitaflow_app
    working_dir: /var/www/html
    ports:
      - "${APP_PORT:-8080}:80"
      - "${VITE_PORT:-5173}:5173"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-vitaflow}
      DB_USERNAME: ${POSTGRES_USER:-vitaflow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vitaflow}
    volumes:
      - ./src:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: vitaflow_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vitaflow}
      POSTGRES_USER: ${POSTGRES_USER:-vitaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitaflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
